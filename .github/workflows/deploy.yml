name: Deploy Logic App (Standard) via Bicep

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy DEV
        id: deploy-infra
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: westeurope
          template: infra/main.bicep
          parameters: infra/main.dev.bicepparam

      - name: Package workflows
        run: cd workflows && zip -r ../workflows.zip . && cd ..

      - name: Deploy workflows
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az logicapp deployment source config-zip \
              --name ${{ steps.deploy-infra.outputs.logicAppName }} \
              --resource-group ${{ steps.deploy-infra.outputs.resourceGroupName }} \
              --src workflows.zip
